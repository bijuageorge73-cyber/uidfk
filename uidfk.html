<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Platform - Post & Cascade UID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        .user-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .uid-section {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .uid-label {
            font-weight: bold;
            color: #667eea;
        }

        .uid-value {
            font-family: monospace;
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            word-break: break-all;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.02);
        }

        .post-btn {
            background: #4CAF50;
            font-size: 16px;
            padding: 10px 24px;
        }

        .history-btn {
            background: #2196F3;
        }

        .friend-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .friend-header {
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .friend-name {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .fk-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
        }

        .fk-status.ok {
            background: #4CAF50;
            color: white;
        }

        .fk-status.bad {
            background: #ff9800;
            color: white;
        }

        .myuid-ref {
            font-family: monospace;
            font-size: 10px;
            background: #f0f0f0;
            padding: 5px;
            border-radius: 5px;
            margin: 8px 0;
            word-break: break-all;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 10px 0;
            min-height: 300px;
            max-height: 350px;
        }

        .message {
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 10px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            text-align: right;
            border-right: 3px solid #667eea;
        }

        .message.received {
            background: #e9ecef;
            text-align: left;
            border-left: 3px solid #4CAF50;
        }

        .message.timeline {
            background: #fff3e0;
            text-align: center;
            border-left: 3px solid #ff9800;
            border-right: 3px solid #ff9800;
            font-size: 12px;
            color: #e65100;
        }

        .input-area {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .create-post-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .create-post-area textarea {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            font-size: 15px;
            resize: vertical;
            font-family: inherit;
        }

        .test-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }

        .stat-badge {
            display: inline-block;
            background: #2196F3;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }

        .history-panel {
            position: fixed;
            right: -500px;
            top: 0;
            width: 500px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
            z-index: 2000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .history-panel.open {
            right: 0;
        }

        .history-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .history-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid #ff9800;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
            display: none;
        }

        .overlay.open {
            display: block;
        }

        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💬 Social Platform | Post & Cascade UID</h1>
        
        <!-- Current User -->
        <div class="user-card">
            <div class="user-header">
                <h2>👤 You <span class="stat-badge" id="myChangeCount">0 changes</span></h2>
                <div class="uid-section">
                    <span class="uid-label">🔑 Current UID:</span>
                    <span class="uid-value" id="myUID">Loading...</span>
                    <button class="history-btn" onclick="openMyHistory()">📜 My History</button>
                </div>
            </div>
        </div>

        <!-- Create Post Area (SELF-TALK) -->
        <div class="create-post-area">
            <textarea id="postContent" rows="2" placeholder="What's on your mind? Write something..."></textarea>
            <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                <button class="post-btn" onclick="createGlobalPost()">📝 POST</button>
            </div>
        </div>

        <!-- Friends -->
        <h2 style="color: white; margin-bottom: 10px;">👥 Your Friends (with FK History)</h2>
        <div class="friends-grid" id="friendsGrid"></div>

        <!-- Test Buttons -->
        <div class="test-buttons">
            <button onclick="addFriend()">➕ Add New Friend</button>
            <button onclick="changeMyUID()">🔄 Change My UID (Cascade)</button>
            <button onclick="resetAll()">🔄 Reset All</button>
        </div>
    </div>

    <!-- My History Panel -->
    <div class="overlay" id="myHistoryOverlay" onclick="closeMyHistory()"></div>
    <div class="history-panel" id="myHistoryPanel">
        <div class="history-header">
            <h3>📜 My Post & UID History</h3>
            <button onclick="closeMyHistory()" style="background: rgba(255,255,255,0.2);">✕</button>
        </div>
        <div class="history-list" id="myHistoryList">
            <div style="text-align: center; padding: 20px; color: #999;">Loading history...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ========== DATABASE WITH COMPLETE HISTORY (FROM WORKING CODE) ==========
        let db = {
            currentUser: null,
            friendships: [],
            messages: [],
            posts: [],           // NEW: For global posts
            myUIDHistory: [],
            myPostHistory: [],   // NEW: For post history
            globalTimeline: []
        };

        function loadData() {
            const saved = localStorage.getItem('social_platform_correct');
            if (saved) {
                db = JSON.parse(saved);
            } else {
                initSampleData();
            }
            render();
        }

        function saveData() {
            localStorage.setItem('social_platform_correct', JSON.stringify(db));
            localStorage.setItem('social_update', Date.now().toString());
        }

        function generateUID(prefix = 'uid') {
            return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
        }

        function initSampleData() {
            const myUID = generateUID('me');
            const timestamp = new Date().toISOString();
            
            db = {
                currentUser: {
                    uid: myUID,
                    name: 'Me',
                    createdAt: timestamp
                },
                friendships: [],
                messages: [],
                posts: [],
                myUIDHistory: [{
                    uid: myUID,
                    changedAt: timestamp,
                    type: 'initial'
                }],
                myPostHistory: [],
                globalTimeline: [{
                    type: 'user',
                    oldUID: null,
                    newUID: myUID,
                    timestamp: timestamp,
                    action: 'Account Created'
                }]
            };
            
            const friendNames = ['Alice', 'Bob', 'Charlie'];
            friendNames.forEach(name => {
                const friendUID = generateUID('friend');
                db.friendships.push({
                    friendUID: friendUID,
                    friendName: name,
                    friendUIDHistory: [{
                        uid: friendUID,
                        changedAt: timestamp,
                        type: 'initial'
                    }],
                    myUID: myUID,
                    myFKHistory: [{
                        uid: myUID,
                        recordedAt: timestamp
                    }],
                    lastMessage: '',
                    lastMessageTime: null
                });
            });
            
            saveData();
        }

        // ========== GLOBAL POST (SELF-TALK - EVERYONE SEES) ==========
        function createGlobalPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content) {
                showToast('Write something first!');
                return;
            }
            
            const newPost = {
                post_id: db.posts.length + 1,
                user_uid: db.currentUser.uid,
                userName: db.currentUser.name,
                content: content,
                created_at: new Date().toISOString(),
                likes: 0
            };
            
            db.posts.unshift(newPost);
            
            // Record in post history
            db.myPostHistory.unshift({
                content: content,
                postedAt: newPost.created_at
            });
            
            saveData();
            
            document.getElementById('postContent').value = '';
            render();
            showToast(`📝 Posted: "${content.substring(0, 50)}..." - Everyone can see this!`);
        }

        // ========== ADD TIMELINE MESSAGE ==========
        function addTimelineMessage(type, oldUID, newUID, targetName = null) {
            const timestamp = new Date();
            const timeStr = timestamp.toLocaleTimeString();
            const dateStr = timestamp.toLocaleDateString();
            
            let messageText = '';
            if (type === 'self') {
                messageText = `🔄 YOUR UID CHANGED: ${oldUID.substring(0, 20)}... → ${newUID.substring(0, 20)}...`;
            }
            
            const timelineMessage = {
                id: Date.now(),
                type: 'timeline',
                changeType: type,
                message: messageText,
                timestamp: timeStr,
                fullTime: timestamp.toISOString(),
                date: dateStr
            };
            
            db.friendships.forEach(friend => {
                const friendMessage = {
                    ...timelineMessage,
                    id: Date.now() + Math.random(),
                    friendUID: friend.friendUID
                };
                db.messages.push(friendMessage);
            });
        }

        // ========== CHANGE MY UID (CASCADE TO ALL FRIENDS) ==========
        function changeMyUID() {
            let newUID = generateUID('me');
            const oldUID = db.currentUser.uid;
            
            if (newUID === oldUID) {
                showToast('Same UID! No change needed.');
                return;
            }
            
            const timestamp = new Date().toISOString();
            
            db.myUIDHistory.push({
                uid: newUID,
                changedAt: timestamp,
                oldUID: oldUID,
                type: 'change'
            });
            
            db.globalTimeline.push({
                type: 'user',
                oldUID: oldUID,
                newUID: newUID,
                timestamp: timestamp,
                action: 'User UID Changed'
            });
            
            showToast(`🔄 Cascading UID: ${oldUID.substring(0, 15)}... → ${newUID.substring(0, 15)}...`);
            
            db.currentUser.uid = newUID;
            
            let updatedFriends = 0;
            db.friendships.forEach(friend => {
                if (friend.myUID === oldUID) {
                    friend.myUID = newUID;
                    friend.myFKHistory.push({
                        uid: newUID,
                        recordedAt: timestamp,
                        oldUID: oldUID
                    });
                    updatedFriends++;
                }
            });
            
            let updatedMessages = 0;
            db.messages.forEach(msg => {
                if (msg.type !== 'timeline') {
                    if (msg.senderUID === oldUID) {
                        msg.senderUID = newUID;
                        updatedMessages++;
                    }
                    if (msg.receiverUID === oldUID) {
                        msg.receiverUID = newUID;
                        updatedMessages++;
                    }
                }
            });
            
            // Update posts
            db.posts.forEach(post => {
                if (post.user_uid === oldUID) {
                    post.user_uid = newUID;
                }
            });
            
            addTimelineMessage('self', oldUID, newUID);
            
            saveData();
            render();
            
            showToast(`✅ UID Changed! ${updatedFriends} friends updated, ${updatedMessages} messages updated.`);
        }

        // ========== SEND MESSAGE TO FRIEND ==========
        function sendMessage(friendUID, messageText) {
            if (!messageText || messageText.trim() === '') return;
            
            const message = {
                id: Date.now(),
                senderUID: db.currentUser.uid,
                receiverUID: friendUID,
                message: messageText.trim(),
                timestamp: new Date().toLocaleTimeString(),
                fullTime: new Date().toISOString(),
                type: 'message'
            };
            
            db.messages.push(message);
            
            const friendship = db.friendships.find(f => f.friendUID === friendUID);
            if (friendship) {
                friendship.lastMessage = messageText;
                friendship.lastMessageTime = message.timestamp;
            }
            
            saveData();
            render();
            
            const input = document.getElementById(`input_${friendUID}`);
            if (input) input.value = '';
            
            showToast(`📤 Message sent to ${friendship.friendName}`);
        }

        function getMessages(friendUID) {
            return db.messages.filter(m => 
                (m.senderUID === db.currentUser.uid && m.receiverUID === friendUID) ||
                (m.senderUID === friendUID && m.receiverUID === db.currentUser.uid) ||
                (m.type === 'timeline' && m.friendUID === friendUID)
            ).sort((a, b) => a.id - b.id);
        }

        // ========== FRIEND MANAGEMENT ==========
        function addFriend() {
            const name = prompt('Enter friend name:', `Friend_${db.friendships.length + 1}`);
            if (!name) return;
            
            const friendUID = generateUID('friend');
            const timestamp = new Date().toISOString();
            
            db.friendships.push({
                friendUID: friendUID,
                friendName: name,
                friendUIDHistory: [{
                    uid: friendUID,
                    changedAt: timestamp,
                    type: 'initial'
                }],
                myUID: db.currentUser.uid,
                myFKHistory: [{
                    uid: db.currentUser.uid,
                    recordedAt: timestamp
                }],
                lastMessage: '',
                lastMessageTime: null
            });
            
            saveData();
            render();
            showToast(`➕ Added ${name} as friend!`);
        }

        function removeFriend(friendUID) {
            if (confirm('Remove this friend?')) {
                db.friendships = db.friendships.filter(f => f.friendUID !== friendUID);
                db.messages = db.messages.filter(m => 
                    (m.receiverUID !== friendUID && m.senderUID !== friendUID) || m.type === 'timeline'
                );
                saveData();
                render();
                showToast('Friend removed');
            }
        }

        // ========== HISTORY DISPLAY ==========
        function openMyHistory() {
            const container = document.getElementById('myHistoryList');
            
            let historyHtml = '<div style="margin-bottom: 15px;"><strong>📝 Your Posts:</strong></div>';
            
            if (db.myPostHistory.length === 0) {
                historyHtml += '<div style="color: #999; padding: 10px;">No posts yet. Write something!</div>';
            } else {
                historyHtml += db.myPostHistory.map(post => {
                    const date = new Date(post.postedAt);
                    return `
                        <div class="history-item" style="border-left-color: #4CAF50;">
                            <div>💬 ${escapeHtml(post.content)}</div>
                            <div class="history-date">📅 ${date.toLocaleDateString()} at ${date.toLocaleTimeString()}</div>
                        </div>
                    `;
                }).join('');
            }
            
            historyHtml += '<div style="margin: 15px 0;"><strong>🔄 Your UID Changes:</strong></div>';
            
            if (db.myUIDHistory.length === 0) {
                historyHtml += '<div style="color: #999; padding: 10px;">No UID changes yet</div>';
            } else {
                const history = [...db.myUIDHistory].reverse();
                historyHtml += history.map(entry => {
                    const date = new Date(entry.changedAt);
                    const isInitial = entry.type === 'initial';
                    return `
                        <div class="history-item">
                            <div style="font-weight: bold;">${isInitial ? '🎉 Account Created' : '🔄 UID Changed'}</div>
                            ${!isInitial ? `<div class="history-old">Old: ${entry.oldUID}</div>` : ''}
                            <div class="history-new">New: ${entry.uid}</div>
                            <div class="history-date">📅 ${date.toLocaleDateString()} at ${date.toLocaleTimeString()}</div>
                        </div>
                    `;
                }).join('');
            }
            
            container.innerHTML = historyHtml;
            document.getElementById('myHistoryPanel').classList.add('open');
            document.getElementById('myHistoryOverlay').classList.add('open');
        }

        function closeMyHistory() {
            document.getElementById('myHistoryPanel').classList.remove('open');
            document.getElementById('myHistoryOverlay').classList.remove('open');
        }

        function resetAll() {
            if (confirm('Reset all data?')) {
                initSampleData();
                render();
                showToast('Reset complete!');
            }
        }

        // ========== RENDER ==========
        function render() {
            if (!db.currentUser) return;
            
            document.getElementById('myUID').innerHTML = db.currentUser.uid;
            document.getElementById('myChangeCount').innerHTML = `${db.myUIDHistory.length - 1} changes`;
            
            const grid = document.getElementById('friendsGrid');
            
            if (db.friendships.length === 0) {
                grid.innerHTML = '<div style="background: white; padding: 40px; text-align: center; border-radius: 20px;">No friends yet. Click "Add New Friend"</div>';
                return;
            }
            
            const myUID = db.currentUser.uid;
            
            grid.innerHTML = db.friendships.map(friend => {
                const messages = getMessages(friend.friendUID);
                const fkMatches = friend.myUID === myUID;
                
                // Also show global posts in each friend's chat
                const globalPostsHtml = db.posts.map(post => {
                    if (post.user_uid === myUID) {
                        return `
                            <div class="message sent" style="background: #e8f5e9;">
                                <div>📝 You posted: ${escapeHtml(post.content)}</div>
                                <div class="message-time">${new Date(post.created_at).toLocaleTimeString()}</div>
                            </div>
                        `;
                    }
                    return '';
                }).join('');
                
                return `
                    <div class="friend-card">
                        <div class="friend-header">
                            <div class="friend-name">
                                👤 ${escapeHtml(friend.friendName)}
                                <span class="fk-status ${fkMatches ? 'ok' : 'bad'}">
                                    ${fkMatches ? '✓ FK Linked' : '⚠️ FK Out of Sync'}
                                </span>
                            </div>
                            <div class="myuid-ref">
                                🔗 Foreign Key: ${friend.myUID}
                                ${fkMatches ? '<span style="color: green;"> ✓ Current</span>' : '<span style="color: red;"> ✗ Outdated!</span>'}
                            </div>
                        </div>
                        
                        <div class="messages-area" id="msgs_${friend.friendUID}">
                            ${globalPostsHtml}
                            ${messages.map(msg => {
                                if (msg.type === 'timeline') {
                                    return `
                                        <div class="message timeline">
                                            <div class="message-text">📅 ${escapeHtml(msg.message)}</div>
                                            <div class="message-time">${msg.timestamp}</div>
                                        </div>
                                    `;
                                }
                                const isSent = msg.senderUID === myUID;
                                return `
                                    <div class="message ${isSent ? 'sent' : 'received'}">
                                        <div class="message-text">
                                            ${isSent ? '📤 You: ' : '📥 Friend: '} ${escapeHtml(msg.message)}
                                        </div>
                                        <div class="message-time">${msg.timestamp}</div>
                                    </div>
                                `;
                            }).join('') || '<div style="text-align: center; color: #999; padding: 20px;">No messages yet</div>'}
                        </div>
                        
                        <div class="input-area">
                            <input type="text" id="input_${friend.friendUID}" 
                                   placeholder="Message ${escapeHtml(friend.friendName)}..."
                                   onkeypress="if(event.key==='Enter') sendMessage('${friend.friendUID}', this.value)">
                            <button onclick="sendMessage('${friend.friendUID}', document.getElementById('input_${friend.friendUID}').value)">Send</button>
                            <button onclick="removeFriend('${friend.friendUID}')" style="background: #dc3545;">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            db.friendships.forEach(friend => {
                const msgsDiv = document.getElementById(`msgs_${friend.friendUID}`);
                if (msgsDiv) msgsDiv.scrollTop = msgsDiv.scrollHeight;
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.sendMessage = sendMessage;
        window.addFriend = addFriend;
        window.removeFriend = removeFriend;
        window.resetAll = resetAll;
        window.changeMyUID = changeMyUID;
        window.createGlobalPost = createGlobalPost;
        window.openMyHistory = openMyHistory;
        window.closeMyHistory = closeMyHistory;

        loadData();
    </script>
</body>
</html>
